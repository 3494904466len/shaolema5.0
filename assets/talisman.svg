  <!-- noise overlay -->
  <g filter="url(#paperNoise)" opacity=".65">
    <rect x="90" y="50" width="440" height="860" fill="#fff"/>
  </g>

  <!-- red talisman strokes (no text) -->
  <g opacity=".92" stroke="#B31A18" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M304 190 L304 760" />
